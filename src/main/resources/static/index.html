<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Text → SQL</title>
  <style>
    body{font-family:Arial,helvetica,sans-serif;max-width:900px;margin:24px auto;padding:0 16px}
    textarea{width:100%;height:120px}
    pre{background:#f6f8fa;padding:12px;border-radius:6px}
    button{margin-right:8px}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
  </style>
</head>
<body>
  <h1>Natural Language → SQL (Strict)</h1>
  <p>Enter a question about the data (examples: "show users", "list orders for alice").</p>
  <textarea id="nl" placeholder="Ask about users, orders, products..."></textarea>
  <div style="margin-top:8px">
    <button id="suggest">Suggest SQL</button>
    <button id="run" disabled>Run SQL</button>
    <button id="clear">Clear</button>
  </div>
  <h3>Suggested SQL</h3>
  <pre id="sql">(no suggestion yet)</pre>
  <h3>Results</h3>
  <div id="results">(no results yet)</div>

  <script src="/app.js"></script>
</body>
</html>
