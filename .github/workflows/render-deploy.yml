name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        env:
          MAVEN_OPTS: -Dmaven.wagon.http.ssl.insecure=true

      - name: Verify build artifacts
        run: ls -lh target/*.jar

      - name: Deploy to Render (create/update service)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID: tea-d9eulfj7uimc73acdle0
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Creating/Updating Render service..."
          
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Error: RENDER_API_KEY is not set"
            exit 1
          fi
          
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Error: GEMINI_API_KEY is not set"
            exit 1
          fi
          
          if [ -z "$RENDER_OWNER_ID" ]; then
            echo "Error: RENDER_OWNER_ID is not set"
            exit 1
          fi
          
          echo "Owner ID: $RENDER_OWNER_ID"
          echo "Creating JSON payload..."
          
          SERVICE_NAME="text-to-sql"
          REPO_URL="https://github.com/Dc1622/text-to-sql-app"

          # Render API expects top-level fields (not wrapped in "service").
          jq -n \
            --arg owner_id "$RENDER_OWNER_ID" \
            --arg gemini_key "$GEMINI_API_KEY" \
            --arg name "$SERVICE_NAME" \
            --arg repo "$REPO_URL" \
            '{
              "type": "web_service",
              "name": $name,
              "ownerId": $owner_id,
              "repo": $repo,
              "branch": "main",
              "autoDeploy": "yes",
              "envVars": [
                {
                  "key": "PORT",
                  "value": "8080"
                },
                {
                  "key": "GEMINI_API_KEY",
                  "value": $gemini_key
                }
              ],
              "serviceDetails": {
                "runtime": "docker",
                "plan": "free",
                "healthCheckPath": "/api/health",
                "envSpecificDetails": {
                  "dockerContext": ".",
                  "dockerfilePath": "./Dockerfile"
                }
              }
            }' > /tmp/service_payload.json

          echo "Payload created for $SERVICE_NAME (secret values omitted from logs)."

          existing_service_id=$(curl -s "https://api.render.com/v1/services?limit=100" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" | \
            jq -r --arg name "$SERVICE_NAME" '.[] | select(.service.name == $name) | .service.id' | head -n1)

          if [ -n "$existing_service_id" ] && [ "$existing_service_id" != "null" ]; then
            echo "Service already exists ($existing_service_id). Triggering deploy..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.render.com/v1/services/${existing_service_id}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{}')
          else
            echo "Sending service creation request to Render..."
            response=$(curl -s -w "\n%{http_code}" -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @/tmp/service_payload.json)
          fi

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "Error: Render API returned error status $http_code"
            exit 1
          fi

          echo "✓ Service created/updated successfully!"
          echo "Monitor at: https://dashboard.render.com"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        continue-on-error: true
        run: |
          SERVICE_URL="https://text-to-sql-app.onrender.com"
          echo "Checking service health at $SERVICE_URL/api/health"
          
          for i in {1..10}; do
            echo "Health check attempt $i..."
            response=$(curl -s -w "%{http_code}" "$SERVICE_URL/api/health" 2>/dev/null)
            http_code="${response: -3}"
            
            if [ "$http_code" = "200" ]; then
              echo "✓ Service is healthy"
              exit 0
            fi
            
            echo "Attempt $i failed with status $http_code"
            sleep 10
          done
          
          echo "⚠ Service health check failed after 10 attempts (may still be deploying)"
          echo "Check the Render dashboard for deployment status"
          exit 0
