name: Deploy to Render

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        env:
          MAVEN_OPTS: -Dmaven.wagon.http.ssl.insecure=true

      - name: Verify build artifacts
        run: ls -lh target/*.jar

      - name: Deploy to Render using render.yaml
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Creating/Updating Render service using render.yaml..."
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/x-yaml" \
            --data-binary @render.yaml
          
          echo "Service creation/update triggered. Monitor at: https://dashboard.render.com"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -f https://text-to-sql-app.onrender.com/api/health 2>/dev/null; then
              echo "✓ Service is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "⚠ Service health check failed (may still be deploying)"
          exit 0
